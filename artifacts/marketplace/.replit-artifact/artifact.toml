kind = "web"
previewPath = "/"
title = "Marketplace"
version = "1.0.0"
id = "artifacts/marketplace"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20787

[services.development]
run = "pnpm --filter @workspace/marketplace run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/marketplace", "run", "build" ]
publicDir = "artifacts/marketplace/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20787"
BASE_PATH = "/"
